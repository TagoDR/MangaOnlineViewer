name: Build and commit

permissions:
  contents: read

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    if: github.ref != 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - run: npm ci
      - run: npm run build:all

  release:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - run: npm ci
      - run: npm run build:all

      - name: Check for significant changes
        run: |
          git add .
          # Use -I to ignore the @version line in userscripts and -w for whitespace/EOL
          DIFF=$(git diff --cached --shortstat -I '^// @version' -w)
          if [ -n "$DIFF" ]; then
            echo "Significant changes detected: $DIFF"
            echo "COMMIT=true" >> $GITHUB_ENV
          else
            echo "No significant changes (only version or whitespace)"
          fi

      - name: Commit changes
        if: env.COMMIT == 'true'
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Apply changes to release
